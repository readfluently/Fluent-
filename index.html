<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluent</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #FFFDF7;
      margin: 0;
      text-align: center;
      color: #222;
    }

    h1 {
      margin: 40px 0 10px;
      font-size: 40px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
      padding: 50px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: 0.25s;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.12);
    }

    .card img {
      width: 140px;
      margin-bottom: 10px;
      max-width: 100%;
      height: auto;
    }

    .card h2 {
      font-size: 18px;
      margin: 0;
    }
  </style>
</head>

<body>
  <h1>Fluent</h1>

  <div class="cards">
    <a class="card" href="apps/library/library.html">
      <img src="shared/assets/images/books.png" alt="Books icon" />
      <h2>Books</h2>
    </a>

    <a class="card" href="apps/exams/exams.html">
      <img src="shared/assets/images/exams.png" alt="Exams icon" />
      <h2>Exams</h2>
    </a>

    <a class="card" href="apps/decoding/decoding.html">
      <img src="shared/assets/images/literacy.png" alt="Read Fluently Literacy icon" />
      <h2>Read Fluently Literacy</h2>
    </a>

    <a class="card" href="apps/support-plan/support-plan.html">
      <img src="shared/assets/images/support-plan.png" alt="Individual Support Plan icon" />
      <h2>Individual Support Plan</h2>
    </a>

    <a class="card" href="apps/teachers/teachers.html">
      <img src="shared/assets/images/teachers.png" alt="Teachers icon" />
      <h2>Teachers</h2>
    </a>
  </div>
</body>
</html>
