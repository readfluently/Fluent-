<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Flash Words</title>

<link rel="stylesheet" href="flash-words.css">

</head>

<body>

<h1>Flash Words</h1>
<p>Watch the words carefully and type them in order.</p>

<div id="game-area">

<div id="word-display">Ready?</div>

<button id="startBtn">Start Game</button>

</div>

<div id="answer-area">

<input class="answer" id="a1">
<input class="answer" id="a2">
<input class="answer" id="a3">
<input class="answer" id="a4">
<input class="answer" id="a5">

<button id="checkBtn">Check Answers</button>

</div>

<div id="result"></div>

<script src="flash-words.js"></script>

</body>
</html>
