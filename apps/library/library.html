<!DOCTYPE html>
<html>

<head>
<title>Fluent Library</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.library{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:30px;
justify-content:center;
}

.book{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:transform 0.2s;
}

.book:hover{
transform:scale(1.05);
}

.book img{
width:100%;
border-radius:6px;
}

</style>

</head>

<body>

<h1>Books Library</h1>

<div class="library">

<div class="book">
<img src="../../shared/assets/images/books.png">
<h3>Reading Comprehension</h3>
</div>

<div class="book">
<img src="../../shared/assets/images/books.png">
<h3>Tech Journey</h3>
</div>

<div class="book">
<img src="../../shared/assets/images/books.png">
<h3>Dictionary</h3>
</div>

</div>

</body>

</html>
