<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chapter</title>

  <style>
    body{font-family:Arial; margin:0; background:#FFFDF7;}
    .topbar{
      position:sticky; top:0; z-index:10;
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      padding:12px 14px; background:#FFFDF7; border-bottom:1px solid #eee;
    }
    .btn{padding:10px 12px; border-radius:10px; border:1px solid #ddd; background:white; cursor:pointer;}
    .btn:disabled{opacity:.5; cursor:not-allowed;}
    .status{font-size:13px; color:#555;}

    .wrap{display:grid; grid-template-columns: 1.5fr 1fr; gap:14px; padding:14px;}
    .card{background:white; border-radius:14px; padding:14px; box-shadow:0 6px 16px rgba(0,0,0,0.08);}

    h1{margin:8px 0 10px;}
    .meta{color:#555; font-size:14px; margin-bottom:10px;}

    /* Static recorder section */
    .recorder{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    audio{width:100%; margin-top:10px;}

    /* Scroll areas */
    .scrollText{max-height:55vh; overflow:auto; padding-right:6px;}
    .scrollWork{max-height:68vh; overflow:auto; padding-right:6px;}

    .text p{line-height:1.7; font-size:18px; margin:0 0 12px;}
    .term{color:#7b3ff2; font-weight:700; cursor:pointer;}
    .term:hover{text-decoration:underline;}

    textarea{
      width:100%; min-height:140px; resize:vertical;
      border:1px solid #ddd; border-radius:12px; padding:10px; font-size:15px;
    }
    .small{font-size:13px; color:#555;}
    .divider{height:1px; background:#eee; margin:12px 0;}
  </style>
</head>

<body>

  <div class="topbar">
    <button class="btn" onclick="history.back()">← Back</button>
    <button class="btn" id="howBtn">How This Works</button>
    <div class="status" id="status">Loading…</div>
  </div>

  <div class="wrap">
    <!-- LEFT: Recorder + Scrollable Text -->
    <div class="card">
      <h1 id="chapterTitle">Loading…</h1>
      <div class="meta" id="chapterMeta"></div>

      <!-- Recorder (static) -->
      <div class="divider"></div>
      <div class="recorder">
        <button class="btn" id="recBtn">⏺ Record</button>
        <button class="btn" id="stopRecBtn" disabled>⏹ Stop</button>
        <button class="btn" id="playBtn" disabled>▶ Play</button>
        <button class="btn" id="clearBtn" disabled>🧹 Clear</button>
        <button class="btn" id="downloadBtn" disabled>⬇ Download</button>
        <div class="small" id="recStatus"></div>
      </div>
      <audio id="player" controls style="display:none;"></audio>

      <!-- Scrollable chapter text -->
      <div class="divider"></div>
      <div class="scrollText">
        <div class="text" id="chapterText"></div>
      </div>
    </div>

    <!-- RIGHT: Worksheet + Glossary (scrollable container) -->
    <div class="card">
      <div class="scrollWork">
        <h2 style="margin-top:0;">Worksheet</h2>
        <div class="small">Type your answers here. They save on this device.</div>

        <div class="divider"></div>

        <h3 style="margin:0 0 6px;">Paraphrasing</h3>
        <div class="small">Write the main idea of the chapter in your own words.</div>
        <textarea id="paraBox" placeholder="My paraphrase..."></textarea>

        <div class="divider"></div>

        <h2 style="margin-top:0;">Glossary</h2>
        <div class="small">Tap a purple word in the text.</div>
        <div class="divider"></div>
        <div id="glossaryBox" class="small">No word selected yet.</div>

        <div class="divider"></div>
        <button class="btn" id="speakWordBtn" disabled>🔊 Read Word + Meaning</button>
      </div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const bookId = params.get("book");
  const chapterId = params.get("chapter");

  const statusEl = document.getElementById("status");
  const chapterTitleEl = document.getElementById("chapterTitle");
  const chapterMetaEl = document.getElementById("chapterMeta");
  const chapterTextEl = document.getElementById("chapterText");

  const howBtn = document.getElementById("howBtn");

  // Worksheet
  const paraBox = document.getElementById("paraBox");

  // Glossary
  const glossaryBox = document.getElementById("glossaryBox");
  const speakWordBtn = document.getElementById("speakWordBtn");
  let selectedTerm = null;
  let selectedDef = null;
  let chapterGlossary = {};

  // Recorder
  const recBtn = document.getElementById("recBtn");
  const stopRecBtn = document.getElementById("stopRecBtn");
  const playBtn = document.getElementById("playBtn");
  const clearBtn = document.getElementById("clearBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const recStatus = document.getElementById("recStatus");
  const player = document.getElementById("player");

  let mediaRecorder = null;
  let chunks = [];
  let audioBlob = null;
  let audioUrl = null;

  function setStatus(msg){ statusEl.textContent = msg || ""; }

  // Save worksheet locally (offline-friendly)
  function wsKey(){ return `rf_ws_${bookId}_${chapterId}_paraphrase`; }
  function loadWorksheet(){
    const saved = localStorage.getItem(wsKey());
    if(saved) paraBox.value = saved;
    paraBox.addEventListener("input", ()=> localStorage.setItem(wsKey(), paraBox.value));
  }

  async function loadChapter(){
    try{
      const res = await fetch("./data/books.json");
      const data = await res.json();

      const book = data[bookId];
      if(!book) throw new Error("Book not found: " + bookId);

      const ch = book.chapters[chapterId];
      if(!ch) throw new Error("Chapter not found: " + chapterId);

      chapterTitleEl.textContent = ch.title;
      chapterMetaEl.textContent = `${book.title} • ${chapterId}`;

      // How This Works button (goes to the new page)
      howBtn.onclick = () => {
        location.href = `how-it-works.html?book=${encodeURIComponent(bookId)}`;
      };

      chapterGlossary = ch.glossary || {};
      renderText(ch.content || []);
      loadWorksheet();

      setStatus("Ready");
    }catch(e){
      chapterTitleEl.textContent = "Could not load chapter";
      chapterMetaEl.textContent = "";
      chapterTextEl.innerHTML = `<p>${e.message}</p>`;
      setStatus("Error");
    }
  }

  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderText(paragraphs){
    const html = paragraphs.map(p=>{
      const safe = escapeHtml(p);
      const withTerms = safe.replace(/\[\[([^\]]+)\]\]/g, (m, term)=>{
        const key = term.toLowerCase();
        return `<span class="term" data-term="${key}">${term}</span>`;
      });
      return `<p>${withTerms}</p>`;
    }).join("");
    chapterTextEl.innerHTML = html;

    chapterTextEl.querySelectorAll(".term").forEach(el=>{
      el.addEventListener("click", ()=>{
        const key = el.getAttribute("data-term");
        const entry = chapterGlossary[key];
        selectedTerm = key;
        selectedDef = entry || null;

        if(!entry){
          glossaryBox.innerHTML = `<b>${key}</b><div class="small">No definition added yet.</div>`;
          speakWordBtn.disabled = true;
          return;
        }

        glossaryBox.innerHTML = `
          <b>${key}</b><br><br>
          <b>Pronunciation:</b> ${entry.pronunciation || "-"}<br>
          <b>Meaning:</b> ${entry.definition || "-"}<br>
          ${entry.simpleMeaning ? `<br><b>Simple meaning:</b> ${entry.simpleMeaning}` : ""}
          ${entry.example ? `<br><br><b>Example:</b> ${entry.example}` : ""}
        `;
        speakWordBtn.disabled = false;
      });
    });
  }

  // TTS only for word + meaning
  function speak(text){
    if(!("speechSynthesis" in window)){
      alert("Text-to-speech is not supported on this browser.");
      return;
    }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(u);
  }

  speakWordBtn.addEventListener("click", ()=>{
    if(!selectedTerm || !selectedDef) return;
    const text = `${selectedTerm}. Pronunciation: ${selectedDef.pronunciation || ""}. Meaning: ${selectedDef.definition || ""}`;
    speak(text);
  });

  // Recorder controls
  async function startRecording(){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];

      mediaRecorder.ondataavailable = e => chunks.push(e.data);
      mediaRecorder.onstop = () => {
        audioBlob = new Blob(chunks, { type: "audio/webm" });
        if(audioUrl) URL.revokeObjectURL(audioUrl);
        audioUrl = URL.createObjectURL(audioBlob);

        player.src = audioUrl;
        player.style.display = "block";

        playBtn.disabled = false;
        clearBtn.disabled = false;
        downloadBtn.disabled = false;

        recStatus.textContent = "Recording saved (on this page).";
        // stop mic
        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();
      recStatus.textContent = "Recording…";
      recBtn.disabled = true;
      stopRecBtn.disabled = false;
    }catch(err){
      recStatus.textContent = "Mic permission blocked. Allow microphone access.";
    }
  }

  function stopRecording(){
    if(mediaRecorder && mediaRecorder.state !== "inactive"){
      mediaRecorder.stop();
      recBtn.disabled = false;
      stopRecBtn.disabled = true;
    }
  }

  function playRecording(){
    if(!audioUrl) return;
    player.play();
  }

  function clearRecording(){
    audioBlob = null;
    if(audioUrl) URL.revokeObjectURL(audioUrl);
    audioUrl = null;
    player.pause();
    player.removeAttribute("src");
    player.style.display = "none";

    playBtn.disabled = true;
    clearBtn.disabled = true;
    downloadBtn.disabled = true;

    recStatus.textContent = "Cleared.";
  }

  function downloadRecording(){
    if(!audioBlob) return;
    const a = document.createElement("a");
    const filename = `${bookId}-${chapterId}-reading.webm`;
    a.href = audioUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  recBtn.addEventListener("click", startRecording);
  stopRecBtn.addEventListener("click", stopRecording);
  playBtn.addEventListener("click", playRecording);
  clearBtn.addEventListener("click", clearRecording);
  downloadBtn.addEventListener("click", downloadRecording);

  loadChapter();
</script>

</body>
</html>
