<script>
  const editor = document.getElementById("editor");
  const wordCount = document.getElementById("wordCount");
  let currentMatches = [];
  let popupEl = null;

  function updateWordCount() {
    const text = (editor.innerText || "").trim();
    const count = text ? text.split(/\s+/).filter(Boolean).length : 0;
    wordCount.textContent = count;
  }

  async function submitWriting() {
    const rawText = editor.innerText.trim();
    if (!rawText) return;

    try {
      const formData = new URLSearchParams();
      formData.append("text", rawText);
      formData.append("language", "en-US");

      const response = await fetch("https://api.languagetool.org/v2/check", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: formData.toString()
      });

      const data = await response.json();
      currentMatches = data.matches || [];

      renderHighlightedText(rawText, currentMatches);
      showFeedbackList(currentMatches);

      const results = document.getElementById("results");
      if (results) {
        results.classList.add("show");
      }
    } catch (error) {
      console.error("Language check failed:", error);
      alert("The writing checker could not load right now.");
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function isSpellingMatch(match) {
    const issueType = match.rule?.issueType || "";
    const category = match.rule?.category?.id || "";
    return issueType.toLowerCase().includes("misspelling") ||
           category.toLowerCase().includes("typo") ||
           category.toLowerCase().includes("misspelling");
  }

  function renderHighlightedText(text, matches) {
    const sorted = [...matches].sort((a, b) => a.offset - b.offset);
    let html = "";
    let cursor = 0;

    sorted.forEach((match, index) => {
      const start = match.offset;
      const end = match.offset + match.length;

      if (start < cursor) return;

      html += escapeHtml(text.slice(cursor, start));

      const original = text.slice(start, end);
      const cssClass = isSpellingMatch(match) ? "spell-error" : "grammar-error";
      const suggestions = (match.replacements || []).slice(0, 3).map(r => r.value);

      html += `
        <span
          class="${cssClass}"
          data-match-index="${index}"
          data-message="${escapeHtml(match.message || "")}"
          data-suggestions="${escapeHtml(JSON.stringify(suggestions))}"
        >${escapeHtml(original)}</span>
      `;

      cursor = end;
    });

    html += escapeHtml(text.slice(cursor));
    editor.innerHTML = html;
    attachErrorClickHandlers();
  }

  function attachErrorClickHandlers() {
    document.querySelectorAll(".spell-error, .grammar-error").forEach(el => {
      el.addEventListener("click", (event) => {
        event.stopPropagation();
        showSuggestionPopup(el);
      });
    });
  }

  function showSuggestionPopup(target) {
    closePopup();

    const rect = target.getBoundingClientRect();
    const suggestions = JSON.parse(target.dataset.suggestions || "[]");
    const message = target.dataset.message || "Possible correction";

    popupEl = document.createElement("div");
    popupEl.className = "suggestion-popup";
    popupEl.innerHTML = `<strong>${message}</strong>`;

    if (suggestions.length) {
      suggestions.forEach(suggestion => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = suggestion;
        btn.addEventListener("click", () => {
          target.outerHTML = escapeHtml(suggestion);
          closePopup();
          updateWordCount();
        });
        popupEl.appendChild(btn);
      });
    } else {
      const note = document.createElement("div");
      note.style.marginTop = "8px";
      note.textContent = "No automatic suggestion. Try rewriting this part.";
      popupEl.appendChild(note);
    }

    document.body.appendChild(popupEl);
    popupEl.style.left = `${window.scrollX + rect.left}px`;
    popupEl.style.top = `${window.scrollY + rect.bottom + 8}px`;
  }

  function closePopup() {
    if (popupEl) {
      popupEl.remove();
      popupEl = null;
    }
  }

  function showFeedbackList(matches) {
    const feedbackList = document.getElementById("feedbackList");
    if (!feedbackList) return;

    if (!matches.length) {
      feedbackList.innerHTML = "<li>Great job — no spelling or grammar issues were found.</li>";
      return;
    }

    feedbackList.innerHTML = matches.slice(0, 8).map(match => {
      const label = isSpellingMatch(match) ? "Spelling" : "Grammar";
      return `<li><strong>${label}:</strong> ${escapeHtml(match.message || "Check this part.")}</li>`;
    }).join("");
  }

  document.addEventListener("click", closePopup);
  editor.addEventListener("input", updateWordCount);
</script>
